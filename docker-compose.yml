# /docker-compose.yml

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/maintenance_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_PROFILES_ACTIVE=dev
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174
      - DEFAULT_ADMIN_USERNAME=Admin    # DEFAULT ADMIN USERNAME
      - DEFAULT_ADMIN_PASSWORD=SWDC123 # DEFAULT ADMIN PASSWORD

  frontend_user:
    build:
      context: ./frontend-user
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8080
  frontend_admin:
    build:
      context: ./frontend-admin
    ports:
      - "5174:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8080
  mysql:
    image: mysql:8
    container_name: maintenance-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: maintenance_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20
